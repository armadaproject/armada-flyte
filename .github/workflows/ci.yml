name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.15.21
      - run: ruff check .

  test:
    name: Test (py ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The supported floor and ceiling (the connector requires 3.10+). Pure Python, so testing the
        # boundaries covers it.
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest -q

  build-image:
    name: Build connector image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Build only (no push, no credentials) so PRs verify the image still builds. release.yml publishes.
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: armada-flyte-connector:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  all-checks:
    name: All required checks done
    if: always()
    needs: [lint, test, build-image]
    runs-on: ubuntu-latest
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped')
        run: exit 1
      - run: echo "All required checks passed"
