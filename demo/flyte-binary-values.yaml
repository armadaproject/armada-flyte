# flyte-binary (v2) chart values for the local quickstart.
#
# Points storage at the minio.yaml and postgres.yaml in this directory, and routes the `armada` task type
# to the in-cluster armada-flyte-connector Service, which the flyte-binary pods reach over cluster DNS.

fullnameOverride: flyte-binary

deployment:
  image:
    # Stock upstream Flyte 2 binary, pinned to the first commit that registers the connector-service
    # (webapi) plugin in the v2 executor (flyteorg/flyte#7565). That registration is what routes
    # `armada` tasks to the connector. Any later build works too. Pinned by commit for reproducibility.
    repository: cr.flyte.org/flyteorg/flyte-binary-v2
    tag: sha-d9e0ebe97be436c7c03c13a8243d3b399d1729e7
    pullPolicy: IfNotPresent
  waitForDB:
    image:
      repository: postgres
      tag: 16-alpine
      pullPolicy: IfNotPresent

console:
  image:
    repository: ghcr.io/unionai-oss/flyteconsole-v2
    tag: latest
    pullPolicy: IfNotPresent

configuration:
  database:
    postgres:
      host: postgres.flyte.svc.cluster.local
      port: 5432
      dbname: flyte
      username: postgres
      password: postgres
      options: "sslmode=disable"

  storage:
    metadataContainer: flyte-data
    userDataContainer: flyte-data
    provider: s3
    providerConfig:
      s3:
        region: us-east-1
        disableSSL: true
        v2Signing: true
        endpoint: http://minio.flyte.svc.cluster.local:9000
        authType: accesskey
        accessKey: minio
        secretKey: minio12345

  logging:
    level: 5

  inline:
    # The Flyte v2 run graph lives in a relational "runs" DB, separate from the main metadata DB
    # above. Same postgres server, different database name.
    runs:
      database:
        postgres:
          host: postgres.flyte.svc.cluster.local
          port: 5432
          dbName: runs
          user: postgres

    task_resources:
      defaults:
        cpu: 500m
        memory: 1Gi
        ephemeralStorage: 0
        gpu: 0
      limits:
        cpu: 0
        memory: 0
        ephemeralStorage: 0
        gpu: 0

    # Signed-URL endpoint the Flyte client (on the host) uses to upload fast-register bundles and read
    # outputs. setup.sh makes localhost:30900 reach minio, through a kind port mapping or a port-forward.
    storage:
      signedURL:
        stowConfigOverride:
          endpoint: http://localhost:30900

    plugins:
      # The connector that armada tasks are delegated to. Runs in-cluster as the armada-flyte-connector
      # Deployment/Service (deploy/kubernetes/connector.yaml), reached over cluster DNS. supportedTaskTypes
      # is what makes the plugin match the `armada` task type to this connector. Without it, Flyte reports
      # "no connector found for task type [armada]". This must live under inline.plugins because the chart's
      # top-level configuration.connectorService is not wired into the config.
      connector-service:
        defaultConnector:
          endpoint: "dns:///armada-flyte-connector.flyte.svc.cluster.local:8000"
          insecure: true
        supportedTaskTypes:
          - armada

      # Env vars stamped onto pods Flyte itself creates (non-armada task types). Armada tasks get the
      # equivalent blob endpoint injected by the connector at job-build time instead.
      k8s:
        default-env-vars:
          - FLYTE_AWS_ENDPOINT: http://minio.flyte.svc.cluster.local:9000
          - FLYTE_AWS_ACCESS_KEY_ID: minio
          - FLYTE_AWS_SECRET_ACCESS_KEY: minio12345
          - _U_EP_OVERRIDE: 'flyte-binary-http.flyte:8090'
          - _U_INSECURE: "true"
          - _U_USE_ACTIONS: "1"

    webhook:
      secretManagerTypes:
        - Embedded
      embeddedSecretManagerConfig:
        type: K8s
        k8sConfig:
          namespace: flyte

# Route the "armada" task type to the connector, and keep the stock plugins for the rest.
enabled_plugins:
  tasks:
    task-plugins:
      enabled-plugins:
        - container
        - sidecar
        - connector-service
        - echo
      default-for-task-types:
        container: container
        sidecar: sidecar
        container_array: k8s-array
        armada: connector-service

# Expose the Flyte API on a fixed NodePort. setup.sh port-forwards localhost:30080 to it, and the
# examples submit there.
service:
  type: NodePort
  nodePorts:
    http: 30080

# The console is served through its own sidecar proxy (console-proxy.yaml) and the API through a
# port-forward, so no chart-managed ingress is needed.
ingress:
  create: false

# Flyte needs broad RBAC in a dev sandbox to create per-namespace resources.
rbac:
  extraRules:
    - apiGroups: ["*"]
      resources: ["*"]
      verbs: ["*"]
